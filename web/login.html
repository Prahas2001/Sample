<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AI Legal Risk Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.1/dist/amazon-cognito-identity.min.js"></script>
    <style>
        :root {
            /* BRAND IDENTITY COLORS */
            --heritage-navy: #0f172a;
            --brand-amber: #b45309; 
            --amber-glow: rgba(180, 83, 9, 0.15);
            --legal-text: #1e293b;
            --text-muted: #64748b;
            --bg-workspace: #f8fafc;
            --radius: 14px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            background-color: var(--bg-workspace);
            color: var(--legal-text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-identity {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
        }

        .icon-box {
            width: 64px; height: 64px; background: var(--heritage-navy);
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px; border-radius: 8px;
            position: relative; overflow: hidden; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
        }

        .laser-line {
            position: absolute; width: 100%; height: 3px;
            background: var(--brand-amber); box-shadow: 0 0 10px var(--brand-amber);
            animation: highSpeedScan 1.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes highSpeedScan {
            0% { top: -5%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        .brand-text {
            font-family: 'Georgia', serif; font-size: 22px; 
            text-transform: uppercase; letter-spacing: 1px; color: var(--heritage-navy);
        }
        .brand-text .accent { color: var(--brand-amber); font-weight: 900; }

        .auth-card {
            background: white;
            width: 100%;
            padding: 45px;
            border-radius: var(--radius);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Georgia', serif;
            font-size: 1.6em;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block; font-size: 0.8em; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: #fcfcfd;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-amber);
            background: white;
            box-shadow: 0 0 0 4px var(--amber-glow);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--heritage-navy);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--brand-amber);
            box-shadow: 0 10px 20px var(--amber-glow);
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--heritage-navy);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover { color: var(--brand-amber); text-decoration: underline; }

        .back-home { margin-top: 40px; font-size: 0.85em; }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="brand-identity">
            <div class="icon-box">
                <div class="laser-line"></div>
                AI
            </div>
            <div class="brand-text">
                Legal Risk <span class="accent">Analyzer</span>
            </div>
        </div>

        <div class="auth-card">
            <h2>Authorized Sign In</h2>
            
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your credentials">
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <button onclick="login()">Sign in</button>

            <div class="footer-links">
                Need an account? <a href="register.html">Register here</a>
            </div>
        </div>

        <div class="footer-links back-home">
            <a href="index.html">← Return to Homepage</a>
        </div>
    </div>

    <script>
        const poolData = { UserPoolId: 'ap-south-1_6J5TKKHhz', ClientId: '7pnq3d358h9iv232dbcfj05sq7' };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({ Username: email, Password: password });
            const cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });

            cognitoUser.authenticateUser(authDetails, {
                onSuccess: (result) => { window.location.href = "dashboard.html"; },
                onFailure: (err) => { alert(err.message); }
            });
        }
    </script>
</body>
</html>
